<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0f0a20"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7d49f8"/>
      <stop offset="100%" style="stop-color:#9d6dff"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f11856"/>
      <stop offset="100%" style="stop-color:#ff4d7d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" rx="24" fill="url(#cardBg)"/>
  <rect width="800" height="400" rx="24" stroke="white" stroke-opacity="0.1" stroke-width="2"/>
  
  <!-- Title -->
  <text x="400" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="white" text-anchor="middle">Earn Badges as You Explore</text>
  
  <!-- Badge 1 - First Light -->
  <g transform="translate(100, 180)">
    <circle cx="50" cy="50" r="50" fill="url(#purple)"/>
    <text x="50" y="55" font-size="40" text-anchor="middle">🔭</text>
    <text x="50" y="130" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">First Light</text>
    <text x="50" y="150" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.6" text-anchor="middle">Log your first observation</text>
  </g>
  
  <!-- Badge 2 - Night Owl -->
  <g transform="translate(250, 180)">
    <circle cx="50" cy="50" r="50" fill="url(#pink)"/>
    <text x="50" y="55" font-size="40" text-anchor="middle">🦉</text>
    <text x="50" y="130" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Night Owl</text>
    <text x="50" y="150" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.6" text-anchor="middle">10 late night sessions</text>
  </g>
  
  <!-- Badge 3 - Planet Hunter -->
  <g transform="translate(400, 180)">
    <circle cx="50" cy="50" r="50" fill="url(#gold)"/>
    <text x="50" y="55" font-size="40" text-anchor="middle">🪐</text>
    <text x="50" y="130" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Planet Hunter</text>
    <text x="50" y="150" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.6" text-anchor="middle">Observe all 8 planets</text>
  </g>
  
  <!-- Badge 4 - Deep Sky -->
  <g transform="translate(550, 180)">
    <circle cx="50" cy="50" r="50" fill="url(#cyan)"/>
    <text x="50" y="55" font-size="40" text-anchor="middle">🌌</text>
    <text x="50" y="130" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Deep Sky</text>
    <text x="50" y="150" font-family="system-ui, sans-serif" font-size="11" fill="white" opacity="0.6" text-anchor="middle">Find 5 nebulae</text>
  </g>
</svg>