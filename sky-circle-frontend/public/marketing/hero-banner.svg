<svg width="1920" height="600" viewBox="0 0 1920 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="30%" style="stop-color:#1a1040"/>
      <stop offset="70%" style="stop-color:#0f0a20"/>
      <stop offset="100%" style="stop-color:#0a0e17"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7d49f8"/>
      <stop offset="100%" style="stop-color:#f11856"/>
    </linearGradient>
    <radialGradient id="nebula1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#7d49f8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7d49f8;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#f11856;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#f11856;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="600" fill="url(#bgGrad)"/>
  
  <!-- Nebula effects -->
  <rect width="1920" height="600" fill="url(#nebula1)"/>
  <rect width="1920" height="600" fill="url(#nebula2)"/>
  
  <!-- Stars field -->
  <g opacity="0.8">
    <circle cx="50" cy="50" r="2" fill="white"/>
    <circle cx="150" cy="120" r="1.5" fill="white"/>
    <circle cx="280" cy="80" r="1" fill="white"/>
    <circle cx="400" cy="200" r="2.5" fill="white"/>
    <circle cx="520" cy="100" r="1" fill="white"/>
    <circle cx="650" cy="180" r="2" fill="white"/>
    <circle cx="800" cy="60" r="1.5" fill="white"/>
    <circle cx="950" cy="150" r="1" fill="white"/>
    <circle cx="1100" cy="90" r="2" fill="white"/>
    <circle cx="1250" cy="200" r="1.5" fill="white"/>
    <circle cx="1400" cy="70" r="2" fill="white"/>
    <circle cx="1550" cy="160" r="1" fill="white"/>
    <circle cx="1700" cy="100" r="2.5" fill="white"/>
    <circle cx="1850" cy="180" r="1.5" fill="white"/>
    <circle cx="100" cy="400" r="1" fill="white"/>
    <circle cx="300" cy="500" r="2" fill="white"/>
    <circle cx="500" cy="450" r="1.5" fill="white"/>
    <circle cx="700" cy="520" r="1" fill="white"/>
    <circle cx="900" cy="480" r="2" fill="white"/>
    <circle cx="1100" cy="550" r="1.5" fill="white"/>
    <circle cx="1300" cy="420" r="1" fill="white"/>
    <circle cx="1500" cy="500" r="2" fill="white"/>
    <circle cx="1700" cy="460" r="1.5" fill="white"/>
    <circle cx="1880" cy="520" r="1" fill="white"/>
  </g>
  
  <!-- Content -->
  <g transform="translate(960, 300)">
    <!-- Main heading -->
    <text x="0" y="-60" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" fill="white" text-anchor="middle">Explore the Cosmos Together</text>
    
    <!-- Subheading -->
    <text x="0" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="white" opacity="0.7" text-anchor="middle">Join thousands of stargazers logging observations, earning badges, and discovering the universe</text>
    
    <!-- CTA Button background -->
    <rect x="-120" y="50" width="240" height="60" rx="30" fill="url(#accentGrad)"/>
    <text x="0" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Get Started Free</text>
  </g>
</svg>